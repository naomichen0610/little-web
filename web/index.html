<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Open this file in a browser, or run: python -m http.server 8000 → http://localhost:8000/web/ -->
  <main class="app">
    <header class="header">
      <h1>Memory Match</h1>
      <p class="subtitle">Find all matching pairs</p>
    </header>

    <section class="hud" aria-label="Game stats">
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span id="moves" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span id="timer" class="stat-value">0:00</span>
      </div>
    </section>

    <div id="board" class="board" role="grid" aria-label="Card grid"></div>

    <p id="status" class="status" role="status">Press Start to begin</p>

    <div class="controls">
      <button id="start-btn" type="button" class="btn btn-primary">Start</button>
      <button id="restart-btn" type="button" class="btn btn-secondary" disabled>Restart</button>
    </div>

    <div id="win-overlay" class="win-overlay hidden" role="dialog" aria-labelledby="win-title" aria-modal="true">
      <div class="win-card">
        <h2 id="win-title">You win!</h2>
        <p id="win-message"></p>
        <button id="play-again-btn" type="button" class="btn btn-primary">Play again</button>
      </div>
    </div>
  </main>

  <script src="js/game.js"></script>
</body>
</html>
